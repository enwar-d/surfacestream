<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Confirming — Surface Stream</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#09090f">
<link rel="icon" id="fav" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'><circle cx='13' cy='18' r='4.2' fill='%237c6ff7'/><circle cx='20' cy='18' r='5' fill='%237c6ff7'/><circle cx='27' cy='18' r='4.2' fill='%237c6ff7'/><circle cx='20' cy='11' r='3.8' fill='%237c6ff7' opacity='.85'/><circle cx='20' cy='25' r='4.2' fill='%237c6ff7' opacity='.9'/></svg>">
<link rel="apple-touch-icon" id="ati" href="">
<script>
(function(){
  const sz=180,c=document.createElement('canvas');
  c.width=c.height=sz;
  const ctx=c.getContext('2d');
  const grad=ctx.createLinearGradient(0,sz,sz,0);
  grad.addColorStop(0,'#09090f');
  grad.addColorStop(0.38,'rgba(18,14,36,1)');
  grad.addColorStop(0.72,'rgba(22,18,52,1)');
  grad.addColorStop(1,'rgba(30,24,72,1)');
  ctx.fillStyle=grad;ctx.beginPath();ctx.roundRect(0,0,sz,sz,36);ctx.fill();
  const glow=ctx.createRadialGradient(sz/2,sz/2,0,sz/2,sz/2,sz*0.5);
  glow.addColorStop(0,'rgba(124,111,247,0.18)');glow.addColorStop(1,'rgba(124,111,247,0)');
  ctx.fillStyle=glow;ctx.beginPath();ctx.roundRect(0,0,sz,sz,36);ctx.fill();
  const sc=sz/58,cx=sz/2,cy=sz/2-1;
  [[20,4,2.2,.5],[13,4,1.4,.32],[27,4,1.4,.32],[7,11,1.7,.38],[13,11,3,.7],[20,11,3.8,.86],[27,11,3,.7],[33,11,1.7,.38],[7,18,2.7,.56],[13,18,4.2,1],[20,18,5,1],[27,18,4.2,1],[33,18,2.7,.56],[7,25,2.1,.44],[13,25,3.5,.8],[20,25,4.2,.9],[27,25,3.5,.8],[33,25,2.1,.44],[13,32,2.7,.56],[20,32,3.2,.7],[27,32,2.7,.56]].forEach(([x,y,r,op])=>{
    ctx.globalAlpha=op;ctx.fillStyle='#7c6ff7';ctx.beginPath();ctx.arc(cx+(x-20)*sc,cy+(y-21)*sc,r*sc,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;
  const png=c.toDataURL('image/png');
  document.getElementById('ati').href=png;
  const fi=document.createElement('link');fi.rel='icon';fi.type='image/png';fi.href=png;document.head.appendChild(fi);
})();
</script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --a:#7c6ff7;--a2:#9d97ff;--ag:rgba(124,111,247,.2);--ar:124,111,247;
  --bg:#09090f;--s2:#1a1a28;--s3:#222235;
  --b1:rgba(255,255,255,.07);--b2:rgba(255,255,255,.13);
  --t1:#f0f0f8;--t2:#9090b0;--t3:#55556a;
  --rd:#f87171;--gr:#4ade80;
  --p:999px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  background:var(--bg);color:var(--t1);
  font-family:'Inter',sans-serif;
  min-height:100vh;overflow:hidden;
}

/* ═══ LOADER — exact copy from index.html ═══ */
#app-loader{
  position:fixed;inset:0;z-index:9999;
  background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;
  transition:opacity .5s ease,visibility .5s ease;
}
#app-loader.done{opacity:0;visibility:hidden}
#app-loader .ring-wrap{position:relative;width:72px;height:72px}
#app-loader .ring-wrap .ring-svg{animation:loaderSpin 1.4s linear infinite}
#app-loader .ring-center{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
#app-loader .loader-name{font-size:1rem;font-weight:700;color:var(--t1);letter-spacing:-.2px}
#app-loader .loader-sub{font-size:.8rem;color:var(--t3);animation:loaderFade 1.8s ease-in-out infinite;transition:opacity .4s ease}
#app-loader .loader-sub.settled{animation:none;opacity:1}
@keyframes loaderSpin{to{transform:rotate(360deg)}}
@keyframes loaderFade{0%,100%{opacity:.45}50%{opacity:1}}

/* ═══ RESULT CARD — shown after loader fades ═══ */
#result-screen{
  position:fixed;inset:0;z-index:100;
  background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;
  opacity:0;visibility:hidden;
  transition:opacity .45s ease,visibility .45s ease;
  padding:24px;
}
#result-screen.vis{opacity:1;visibility:visible}

/* Ambient glow */
#result-screen::before{
  content:'';position:absolute;
  width:650px;height:650px;border-radius:50%;
  background:radial-gradient(ellipse,rgba(124,111,247,.1) 0%,transparent 70%);
  top:50%;left:50%;transform:translate(-50%,-58%);
  pointer-events:none;
  animation:glowPulse 6s ease-in-out infinite;
}
@keyframes glowPulse{0%,100%{opacity:.7;transform:translate(-50%,-58%) scale(1)}50%{opacity:1;transform:translate(-50%,-58%) scale(1.07)}}

/* Logo */
.logo{display:flex;align-items:center;gap:11px;text-decoration:none;position:relative;z-index:1}
.logo-txt{font-size:1.12rem;font-weight:800;color:var(--t1);letter-spacing:-.25px}
.logo-txt .s{color:var(--a);font-weight:900}

/* Glass card — matches .ob-box / .md from main app */
.card{
  position:relative;z-index:1;
  background:rgba(14,11,26,.88);
  backdrop-filter:blur(40px) saturate(160%) brightness(.85);
  -webkit-backdrop-filter:blur(40px) saturate(160%) brightness(.85);
  border:1px solid rgba(255,255,255,.14);
  border-radius:22px;
  padding:38px 32px 32px;
  width:min(420px,92vw);
  box-shadow:0 32px 80px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.1);
  display:flex;flex-direction:column;align-items:center;
  text-align:center;
  animation:cardIn .45s cubic-bezier(.2,1,.4,1) both;
}
@keyframes cardIn{from{opacity:0;transform:translateY(18px) scale(.97)}to{opacity:1;transform:none}}

/* State icon */
.state-icon{
  width:66px;height:66px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:22px;flex-shrink:0;
}
.state-icon.ok{
  background:rgba(74,222,128,.1);
  border:1.5px solid rgba(74,222,128,.28);
  animation:iconPop .4s cubic-bezier(.2,1.6,.4,1);
}
.state-icon.fail{
  background:rgba(248,113,113,.1);
  border:1.5px solid rgba(248,113,113,.28);
  animation:iconPop .4s cubic-bezier(.2,1.6,.4,1);
}
@keyframes iconPop{from{transform:scale(.55);opacity:0}to{transform:scale(1);opacity:1}}
.state-icon svg{width:28px;height:28px}

/* Text */
.card-title{font-size:1.24rem;font-weight:800;letter-spacing:-.4px;margin-bottom:8px}
.card-sub{font-size:.86rem;color:var(--t2);line-height:1.65;max-width:300px}
.card-sub.err{color:rgba(248,113,113,.88)}

/* Progress bar */
.prog-wrap{width:100%;height:2px;background:var(--b1);border-radius:1px;margin-top:26px;overflow:hidden;opacity:0;transition:opacity .3s}
.prog-wrap.vis{opacity:1}
.prog-bar{height:100%;width:0%;background:linear-gradient(90deg,var(--a),var(--a2));border-radius:1px;box-shadow:0 0 8px var(--ag);transition:width 1.1s cubic-bezier(.4,0,.2,1)}

/* Primary button — matches .fbt */
.btn{
  display:inline-flex;align-items:center;gap:7px;
  margin-top:22px;
  padding:10px 26px;border-radius:var(--p);
  background:var(--a);color:#fff;
  font-family:'Inter',sans-serif;font-size:.88rem;font-weight:700;
  border:none;cursor:pointer;
  box-shadow:0 4px 14px var(--ag),inset 0 1px 0 rgba(255,255,255,.2);
  transition:all .2s;text-decoration:none;
}
.btn:hover{background:var(--a2);transform:translateY(-1px);box-shadow:0 6px 22px var(--ag),inset 0 1px 0 rgba(255,255,255,.2)}
.btn svg{width:14px;height:14px}

/* Footer */
.footer{font-size:.72rem;color:var(--t3);position:relative;z-index:1}
</style>
</head>
<body>

<!-- ═══ LOADER (exact markup from index.html) ═══ -->
<div id="app-loader">
  <div class="ring-wrap" id="loader-ring">
    <svg class="ring-svg" width="72" height="72" viewBox="0 0 72 72" fill="none">
      <circle cx="36" cy="36" r="30" stroke="rgba(var(--ar),.15)" stroke-width="5"/>
      <path d="M36 6 A30 30 0 0 1 66 36" stroke="url(#loaderGrad)" stroke-width="5" stroke-linecap="round"/>
      <defs>
        <linearGradient id="loaderGrad" x1="36" y1="6" x2="66" y2="36" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="var(--a)" stop-opacity="0"/>

        <circle cx="27" cy="11" r="3"   fill="var(--a)" opacity=".7"/>
        <circle cx="33" cy="11" r="1.7" fill="var(--a)" opacity=".38"/>
        <circle cx="7"  cy="18" r="2.7" fill="var(--a)" opacity=".56"/>
        <circle cx="13" cy="18" r="4.2" fill="var(--a)"/>

  <div style="text-align:center;display:flex;flex-direction:column;gap:6px;align-items:center">

</div>

<!-- ═══ RESULT SCREEN (shown after verification completes) ═══ -->
<div id="result-screen">

  <a href="https://watchsurface.stream" class="logo">
    <svg width="38" height="38" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
      <circle cx="13" cy="4"  r="1.4" fill="#7c6ff7" opacity=".32"/>
      <circle cx="20" cy="4"  r="2.2" fill="#7c6ff7" opacity=".5"/>
      <circle cx="27" cy="4"  r="1.4" fill="#7c6ff7" opacity=".32"/>
      <circle cx="7"  cy="11" r="1.7" fill="#7c6ff7" opacity=".38"/>
      <circle cx="13" cy="11" r="3"   fill="#7c6ff7" opacity=".7"/>
      <circle cx="20" cy="11" r="3.8" fill="#7c6ff7" opacity=".86"/>

      <circle cx="33" cy="11" r="1.7" fill="#7c6ff7" opacity=".38"/>

      <circle cx="27" cy="18" r="4.2" fill="#7c6ff7" opacity="1"/>
      <circle cx="33" cy="18" r="2.7" fill="#7c6ff7" opacity=".56"/>
      <circle cx="7"  cy="25" r="2.1" fill="#7c6ff7" opacity=".44"/>
      <circle cx="13" cy="25" r="3.5" fill="#7c6ff7" opacity=".8"/>
      <circle cx="20" cy="25" r="4.2" fill="#7c6ff7" opacity=".9"/>
      <circle cx="27" cy="25" r="3.5" fill="#7c6ff7" opacity=".8"/>
      <circle cx="33" cy="25" r="2.1" fill="#7c6ff7" opacity=".44"/>

    <div class="logo-txt">Surface <span class="s">Stream</span></div>

  <div class="card" id="result-card">
    <div class="state-icon" id="state-icon"></div>

    <div class="card-sub"   id="card-sub"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const WORKER = 'https://sstreamstuff.enwar-d.workers.dev';

const elLoader  = document.getElementById('app-loader');
const elSub     = document.getElementById('loader-sub');
const elResult  = document.getElementById('result-screen');
const elIcon    = document.getElementById('state-icon');
const elTitle   = document.getElementById('card-title');
const elCardSub = document.getElementById('card-sub');
const elProg    = document.getElementById('prog-wrap');
const elBar     = document.getElementById('prog-bar');
const elActions = document.getElementById('card-actions');

function dismissLoader(cb) {
  elSub.classList.add('settled');
  elLoader.classList.add('done');
  setTimeout(() => {
    elResult.classList.add('vis');
    if (cb) cb();
  }, 350);
}

function showOk() {
  dismissLoader(() => {
    elIcon.className = 'state-icon ok';
    elIcon.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
    elTitle.textContent  = 'Email verified!';
    elCardSub.textContent = "You're all set. Redirecting to Surface Stream…";
    elProg.classList.add('vis');
    requestAnimationFrame(() => requestAnimationFrame(() => { elBar.style.width = '100%'; }));
    elActions.innerHTML = `<a href="https://watchsurface.stream" class="btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      Go to Surface Stream
    </a>`;
    setTimeout(() => { window.location.href = 'https://watchsurface.stream'; }, 2000);
  });
}

function showError(msg) {
  elSub.classList.add('settled');
  dismissLoader(() => {
    elIcon.className = 'state-icon fail';
    elIcon.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
    elTitle.textContent   = 'Verification failed';
    elCardSub.className   = 'card-sub err';
    elCardSub.textContent = msg;
    elActions.innerHTML   = `<a href="https://watchsurface.stream" class="btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      Go to watchsurface.stream
    </a>`;
  });
}

async function confirm() {
  const params    = new URLSearchParams(window.location.search);
  const tokenHash = params.get('token_hash');
  const type      = params.get('type') || 'email';

  if (!tokenHash) {
    showError('This confirmation link is invalid or has expired.');
    return;
  }

  let cfg;
  try {
    const r = await fetch(`${WORKER}/api/supa-config`);
    if (!r.ok) throw new Error();
    cfg = await r.json();
  } catch {
    showError('Could not reach the server. Check your connection and try again.');
    return;
  }

  const supa = window.supabase.createClient(cfg.url, cfg.anon);
  const { error } = await supa.auth.verifyOtp({ token_hash: tokenHash, type });

  if (error) {
    showError(error.message || 'Something went wrong. Please try again.');
    return;
  }

  showOk();
}

confirm();
</script>
</body>
</html>
